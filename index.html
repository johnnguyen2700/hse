<!doctype html>
<html lang="vi">
<head>
  <meta name="theme-color" content="#05030a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HSE 8/3</title>
  <link rel="preload" href="audio.mp3" as="audio" type="audio/mpeg" />
  <style>
    :root{
      /* Sử dụng chuẩn xác định dạng file bạn tải lên */
      --letter-frame: url('letter-frame.png');
      --flower-hand: url('flower-hand.png');
      --rose:#d86a66;
      --text:#6d5849;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      /* Background toàn cục để cả 2 màn hình đều có chung nền tối */
      background:
        radial-gradient(1200px 900px at 30% 18%, #1a0f2a 0%, rgba(26,15,42,.25) 36%, transparent 56%),
        radial-gradient(1200px 900px at 82% 24%, #2b0c28 0%, rgba(43,12,40,.22) 34%, transparent 54%),
        linear-gradient(180deg, #090410 0%, #05030a 60%, #030109 100%);
      color:#fff;
    }

    button{font:inherit}
    img{max-width:100%;display:block}

    /* Các canvas hiệu ứng dùng chung cho cả trang */
    #starsCanvas, #petalsCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }
    #starsCanvas{z-index:1}
    #petalsCanvas{z-index:2}

    .scene{
      position:fixed;
      inset:0;
      overflow:hidden;
    }

    /* INTRO */
    #introScene{
      z-index:10;
      background: transparent;
      transition:opacity .95s ease, visibility .95s ease, transform .95s ease;
    }
    #introScene.gone{
      opacity:0;
      visibility:hidden;
      transform:scale(1.02);
      pointer-events:none;
    }

    #introHaze{
      display: none; /* Đã xoá sương mờ */
    }

    #letterStage{
      position:absolute;
      left:50%;
      top:50%;
      width:min(92vw, 1220px);
      height:min(82vh, 820px);
      transform:translate(-50%, -49%);
      display:grid;
      place-items:center;
      perspective:1800px;
    }

    #letterStage.open .env-flap{
      transform:rotateX(168deg);
    }
    #letterStage.open #openEnvelopeBtn{
      transform:translate(-50%, -12px) scale(.96);
      opacity:0;
      pointer-events:none;
    }
    #letterStage.open #letterCard{
      transform:translate(-50%, -52%) scale(1);
      opacity:1;
      pointer-events:auto;
    }

    /* Đã xoá bóng quầng sáng phía sau bức thư */
    .letter-glow{
      display: none;
    }

    #envelopeWrap{
      position:absolute;
      left:50%;
      top:58%;
      width:min(76vw, 760px);
      aspect-ratio: 1.38 / 1;
      transform:translate(-50%, -50%);
      isolation:isolate;
    }

    /* Đã xoá bóng dưới phong bì */
    #envelopeWrap::after{
      display: none;
    }

    .env-layer{
      position:absolute;
      inset:0;
      background-position:center;
      background-repeat:no-repeat;
      background-size:contain;
    }

    .env-back{
      z-index:1;
      background-image: linear-gradient(180deg, #f7e6c8, #eed0a1 65%, #dbb787 100%);
      border-radius:20px;
    }

    .env-back::before{
      content:"";
      position:absolute;
      inset:8% 9% 30%;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,0));
      opacity:.45;
      pointer-events:none;
    }

    .env-front{
      z-index:4;
      background-image: linear-gradient(180deg, #f3d8b2, #ebc594 72%, #d3a66f 100%);
      border-radius:20px;
      clip-path:polygon(0 32%, 50% 67%, 100% 32%, 100% 100%, 0 100%);
      box-shadow:inset 0 2px 0 rgba(255,255,255,.3);
    }

    .env-flap{
      z-index:5;
      transform-origin:50% 0%;
      transform-style:preserve-3d;
      transition:transform 1.1s cubic-bezier(.22,.9,.18,1);
      background-image: linear-gradient(180deg, #f6e0bb, #eac18d);
      clip-path:polygon(0 0, 50% 72%, 100% 0);
    }

    .env-flap::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,0));
      mix-blend-mode:screen;
    }

    #openEnvelopeBtn{
      position:absolute;
      left:50%;
      bottom:14%;
      transform:translateX(-50%);
      z-index:7;
      border:none;
      cursor:pointer;
      min-width:126px;
      padding:13px 18px;
      border-radius:999px;
      color:#fff;
      font-weight:800;
      letter-spacing:.2px;
      background:linear-gradient(135deg, #ec7f75, #d85a73 55%, #b33b61 100%);
      box-shadow:
        0 12px 24px rgba(179,59,97,.35),
        inset 0 2px 8px rgba(255,255,255,.24),
        inset 0 -2px 8px rgba(0,0,0,.18);
      transition:transform .25s ease, opacity .3s ease, box-shadow .25s ease;
    }
    #openEnvelopeBtn:hover{box-shadow:0 16px 28px rgba(179,59,97,.45), inset 0 2px 8px rgba(255,255,255,.24), inset 0 -2px 8px rgba(0,0,0,.18)}
    #openEnvelopeBtn:active{transform:translateX(-50%) scale(.98)}

    .wax-dot{
      display:inline-grid;
      place-items:center;
      width:22px;height:22px;
      margin-right:8px;
      border-radius:50%;
      vertical-align:-4px;
      background:radial-gradient(circle at 30% 30%, #ffc3cf, #ef7c88 55%, #cf4663 100%);
      box-shadow:inset 0 2px 4px rgba(255,255,255,.35), 0 4px 8px rgba(0,0,0,.15);
      font-size:11px;
    }

    #letterCard{
      position:absolute;
      left:50%;
      top:50%;
      width:min(88vw, 1020px);
      min-height:min(70vh, 610px);
      transform:translate(-50%, 16%) scale(.86);
      opacity:0;
      z-index:3;
      pointer-events:none;
      transition:transform 1.1s cubic-bezier(.22,.88,.18,1), opacity .75s ease;
      border-radius:34px;
      background:
        linear-gradient(rgba(255,251,240,.82), rgba(255,251,240,.82)),
        var(--letter-frame) center/100% 100% no-repeat,
        linear-gradient(180deg, rgba(255,248,235,.95), rgba(252,245,233,.96));
      box-shadow: inset 0 0 0 1px rgba(201,150,110,.18);
      overflow:hidden;
      backdrop-filter:blur(2px);
    }

    #letterCard::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 6% 8%, rgba(224,84,80,.16) 0 8%, transparent 9%),
        radial-gradient(circle at 12% 16%, rgba(120,150,48,.16) 0 6%, transparent 7%),
        radial-gradient(circle at 94% 8%, rgba(224,84,80,.16) 0 8%, transparent 9%),
        radial-gradient(circle at 88% 16%, rgba(120,150,48,.16) 0 6%, transparent 7%),
        radial-gradient(circle at 6% 92%, rgba(224,84,80,.16) 0 8%, transparent 9%),
        radial-gradient(circle at 12% 84%, rgba(120,150,48,.16) 0 6%, transparent 7%),
        radial-gradient(circle at 94% 92%, rgba(224,84,80,.16) 0 8%, transparent 9%),
        radial-gradient(circle at 88% 84%, rgba(120,150,48,.16) 0 6%, transparent 7%);
      pointer-events:none;
      opacity:.85;
    }

    #letterPaper{
      position:relative;
      z-index:2;
      padding:clamp(36px, 5vw, 58px) clamp(26px, 6vw, 90px) clamp(34px, 5vw, 54px);
      color:var(--text);
      text-align:center;
      min-height:min(70vh, 610px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:10px;
    }

    #letterHeading{
      margin:0;
      font-size:clamp(36px, 6vw, 72px);
      line-height:1;
      font-weight:500;
      color:var(--rose);
      font-family: "Segoe Script", "Brush Script MT", cursive, system-ui;
      text-shadow:0 2px 0 rgba(255,255,255,.5);
    }

    #letterBody{
      max-width:850px;
      min-height: 280px;
      font-size:clamp(18px, 2.2vw, 25px);
      line-height:1.72;
      letter-spacing:.2px;
      color:#5e554e;
      white-space:pre-line;
    }

    .typing-caret{
      display:inline-block;
      width:2px;
      height:1.05em;
      margin-left:4px;
      vertical-align:-2px;
      background:rgba(216,106,102,.75);
      animation:blink 1s steps(1) infinite;
    }

    #letterSign{
      width:100%;
      max-width:850px;
      text-align:right;
      font-size:clamp(18px, 2.1vw, 28px);
      color:#b28753;
      font-family: "Segoe Script", "Brush Script MT", cursive, system-ui;
      opacity:.95;
      margin-top:6px;
    }

    @keyframes blink{50%{opacity:0}}

    #bouquetTrigger{
      position:absolute;
      left:max(12px, calc(10px + env(safe-area-inset-left)));
      bottom:max(8px, calc(8px + var(--safe-bottom)));
      width:min(33vw, 280px);
      aspect-ratio: 0.76 / 1;
      z-index:12;
      /* Khôi phục nguyên gốc CSS chuẩn để hiển thị ảnh hoa không bị lỗi */
      background:var(--flower-hand) center bottom/contain no-repeat;
      border:none;
      cursor:pointer;
      opacity:0;
      transform:translateY(18px) scale(.98);
      transition:opacity .7s ease, transform .7s ease, filter .25s ease;
      filter:drop-shadow(0 18px 20px rgba(0,0,0,.18));
    }
    #bouquetTrigger.enabled{
      opacity:1;
      transform:translateY(0) scale(1);
    }
    #bouquetTrigger::before{
      content:"";
      position:absolute;
      left:10%; right:10%; bottom:8%;
      height:16%;
      border-radius:999px;
      background:radial-gradient(ellipse at center, rgba(255,105,180,.28), transparent 72%);
      filter:blur(14px);
      opacity:.85;
    }
    #bouquetTrigger::after{
      content:"";
      position:absolute;
      inset:18% 22% 18% 20%;
      border-radius:28px;
      box-shadow:0 0 0 0 rgba(255,128,180,.0);
      animation:pulse 2.1s ease-in-out infinite;
      opacity:.85;
    }
    #bouquetTrigger:not(.enabled)::after{display:none}
    #bouquetTrigger:hover{filter:drop-shadow(0 20px 24px rgba(0,0,0,.22)) brightness(1.03)}
    #bouquetTrigger:active{transform:translateY(1px) scale(.985)}

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(255,128,180,.0)}
      35%{box-shadow:0 0 0 10px rgba(255,128,180,.18)}
      80%{box-shadow:0 0 0 24px rgba(255,128,180,.0)}
      100%{box-shadow:0 0 0 0 rgba(255,128,180,.0)}
    }

    #bouquetHint{
      position:absolute;
      left:min(21vw, 180px);
      bottom:calc(110px + var(--safe-bottom));
      z-index:13;
      max-width:min(44vw, 340px);
      padding:12px 16px;
      border-radius:18px;
      font-size:clamp(13px, 1.6vw, 16px);
      color:#7c4858;
      background:rgba(255,248,251,.85);
      border:1px solid rgba(212,126,148,.18);
      box-shadow:0 14px 26px rgba(0,0,0,.12);
      opacity:0;
      transform:translateY(12px);
      transition:opacity .55s ease, transform .55s ease;
      backdrop-filter:blur(6px);
      pointer-events:none;
    }
    #bouquetHint.show{
      opacity:1;
      transform:translateY(0);
    }

    /* DROP SCENE (KHÔNG GIAN LỜI CHÚC) */
    #dropScene{
      z-index:20;
      opacity:0;
      visibility:hidden;
      background: transparent;
      transition:opacity 1s ease, visibility 1s ease;
    }
    #dropScene.show{
      opacity:1;
      visibility:visible;
    }

    #texts{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}

    /* ĐÃ SỬA: Loại bỏ bẻ chữ, chữ sẽ luôn nằm gọn trên 1 hàng không bị tách (nowrap) */
    .wish-item{
      position:absolute;
      left:0; top:0;
      text-align: center;
      white-space: nowrap; /* Không bị tách chữ/xuống dòng */
      color:rgba(255,175,224,.98);
      text-shadow:0 0 8px rgba(255,111,180,.7), 0 0 18px rgba(255,111,180,.44);
      letter-spacing:.2px;
      opacity:0;
      transition: opacity 0.8s ease;
      will-change: transform;
      padding: 10px; 
    }

    #musicChip{
      position:absolute;
      z-index:4;
      top:calc(10px + var(--safe-top));
      left:10px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(10,6,18,.5);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:0 10px 24px rgba(0,0,0,.28);
    }

    #musicToggle{
      border:none;
      cursor:pointer;
      color:#fff;
      font-weight:700;
      padding:9px 12px;
      border-radius:999px;
      background:linear-gradient(135deg, rgba(255,111,180,.24), rgba(255,79,163,.15));
      box-shadow:inset 0 0 0 1px rgba(255,111,180,.3);
    }

    #audioEl{display:none}

    @media (max-width: 900px){
      #letterStage{height:min(84vh, 820px)}
      #envelopeWrap{width:min(86vw, 680px); top:61%}
      #letterCard{width:min(92vw, 960px)}
      #bouquetHint{left:20px; right:20px; max-width:320px; bottom:calc(155px + var(--safe-bottom))}
    }

    @media (max-width: 640px){
      #letterStage{width:96vw;height:88vh;transform:translate(-50%, -50%)}
      #envelopeWrap{width:94vw; top:64%}
      #letterCard{width:94vw; min-height:66vh; border-radius:26px}
      #letterPaper{padding:28px 20px 26px}
      #letterBody{min-height:240px; line-height:1.66}
      #bouquetTrigger{width:min(42vw, 220px)}
      #bouquetHint{font-size:13px; padding:11px 14px; bottom:calc(130px + var(--safe-bottom))}
      #musicChip{padding:8px 10px}
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>
  <canvas id="petalsCanvas"></canvas>

  <section id="introScene" class="scene">
    <div id="letterStage">
      <div id="letterCard" aria-hidden="true">
        <div id="letterPaper">
          <h1 id="letterHeading">Dear Chị Em</h1>
          <div id="letterBody"></div>
          <div id="letterSign"></div>
        </div>
      </div>

      <div id="envelopeWrap" aria-label="Phong bì lời chúc">
        <div class="env-layer env-back"></div>
        <div class="env-layer env-flap"></div>
        <div class="env-layer env-front"></div>

        <button id="openEnvelopeBtn" type="button" aria-label="Mở thư">
          <span class="wax-dot">✦</span>Mở thư
        </button>
      </div>
    </div>

    <button id="bouquetTrigger" type="button" aria-label="Mở không gian lời chúc"></button>
    <div id="bouquetHint">Bấm vào bó hoa ở góc trái để bước vào không gian lời chúc ✨</div>
  </section>

  <section id="dropScene" class="scene">
    <div id="texts"></div>

    <div id="musicChip">
      <button id="musicToggle" type="button">Bật nhạc</button>
      <span style="font-size:12px;opacity:.84">Dùng file <b>audio.mp3</b></span>
    </div>
  </section>

  <audio id="audioEl" loop preload="auto" playsinline>
    <source src="audio.mp3" type="audio/mpeg" />
  </audio>

  <script>
    (() => {
      const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const DPR = Math.min(2, window.devicePixelRatio || 1);
      const $ = (s) => document.querySelector(s);

      const introScene = $('#introScene');
      const dropScene = $('#dropScene');
      const letterStage = $('#letterStage');
      const openEnvelopeBtn = $('#openEnvelopeBtn');
      const bouquetTrigger = $('#bouquetTrigger');
      const bouquetHint = $('#bouquetHint');
      const letterBody = $('#letterBody');
      const letterSign = $('#letterSign');
      const textsContainer = $('#texts');
      const audioEl = $('#audioEl');
      const musicToggle = $('#musicToggle');
      audioEl.volume = 1;
      audioEl.muted = false;
      audioEl.preload = 'auto';
      audioEl.load();

      const starsCanvas = $('#starsCanvas');
      const petalsCanvas = $('#petalsCanvas');
      const starCtx = starsCanvas.getContext('2d', {alpha:true});
      const petalsCtx = petalsCanvas.getContext('2d', {alpha:true});

      let W = innerWidth;
      let H = innerHeight;
      let introOpen = false;
      let dropStarted = false;
      let musicOn = false;
      let audioPrimed = false;
      let allowBouquet = false;
      let typeTimer = null;
      let last = performance.now();
      let windX = 0;
      let targetWindX = 0;
      let pointerDown = false;
      let lastPointerX = 0;
      const margin = 10;
      const textDelayMs = 300; // thời gian trì hoãn khi vào không gian lời chúc
      const wishWarmupMs = 700; // làm mượt giai đoạn mới spawn
      const wishFallSpeed = 3.4;
      const laneVerticalGap = 32;
      let wishFontSizePx = 32;
      let wishLetterSpacingPx = 0.2;
      
      let stars = [];
      let petals = [];
      let physicsWishes = [];
      let laneCount = 2;
      let laneTopY = [];
      let laneCursor = 0;

      const letterParagraphs = [
        'Nhân ngày Quốc tế Phụ nữ 8/3, anh em sinh viên HSE xin gửi tới hội chị em những lời chúc dịu dàng và chân thành nhất.',
        'Chúc chị em luôn xinh đẹp, tự tin, học tập thật tốt, vui vẻ mỗi ngày và luôn gặp thật nhiều may mắn trên chặng đường của mình.',
        'Cảm ơn chị em vì đã làm cho thanh xuân ở HSE trở nên rực rỡ hơn, ấm áp hơn và đáng nhớ hơn rất nhiều.',
        'Mong rằng ngày hôm nay và cả những ngày sau đó, chị em luôn được yêu thương, trân trọng và hạnh phúc theo cách riêng của mình.'
      ];
      const signature = '— Anh em sinh viên HSE 💖';

      const wishes = [
        'Luôn luôn xinh đẹp và hạnh phúc',
        'Danh Nguyễn Trà My',
        'Phạm Mai Phương Hà',
        'Lê Ngọc Thủy',
        'Luôn tươi trẻ và thi cử lúc nào cũng "học ít điểm cao"',
        'Triệu Ngọc Minh Thu',
        'Phạm Hồng Minh',
        'Trịnh Thị Hiền Trang',
        'Deadline nhìn cũng phải "né"',
        'Dương Thùy My',
        'Nguyễn Trà My',
        'Nguyễn Hoàng Vân',
        'Học hành mượt như lướt "TikTok"',
        'Phan Thị Cẩm Ly',
        'Nguyễn Ngọc Khoá',
        'Lưu Thị Thu Giang',
        'Mọi việc đều thuận buồm xuôi gió',
        'Đỗ Vũ Minh Nguyệt',
        'Nguyễn Thị Thúy',
        'Đỗ Thị Hiền',
        '8386 mãi đỉnh',
        'Phan Tuyết Băng',
        'Trần Thị Ngân',
        'Nguyễn Khánh Vân',
        'Tiền vào như nước',
        'Phùng Thị Khánh Huyền',
        'Nguyễn Ngọc Lan Christina',
        'Cao Thị Khánh Xuân',
        'Đi ăn không phải xếp hàng :))',
        'Lâm Thị Hồng Ngọc',
        'Nguyễn Phương Anh',
        'Nguyễn Bích Ngọc',
        'Lúc nào cũng đầy năng lượng',
        'Nguyễn Ngọc Bảo Hân',
        'Nguyễn Hà Trâm',
        'Cao Thị Thương',
        'Mọi dự định đều thành công',
        'Phạm Thu Trang',
        'Hà Thị Ngọc Quyên',
        'Nguyễn Diệu Ngân',
        'Nỗ lực luôn được đền đáp xứng đáng',
        'Nguyễn Thị Thanh Thảo',
        'Đào Trâm Anh',
        'Lê Hồng Ánh',
        'Sống nhẹ nhàng và bình yên',
        'Nguyễn Thương Huyền',
        'Nguyễn Mỹ Hòa',
        'Nguyễn Kim Ngân',
        'Cuộc sông muôn màu ý nghĩa',
        'Đỗ Thị Hải Yến',
        'Nguyễn Trần Thùy Dương',
        'Trần Thu Ngân',
        'Luôn thành công và tỏa sáng',
        'Nguyễn Phương Quỳnh Anh',
        'Nguyễn Phương Thuỳ Anh',
        'Bùi Bảo Anh',
        'Luôn tự tin theo đuổi ước mơ',
        'Nguyễn Kiều Trang',
        'Mai Thuỳ Linh',
        'Hoàng Châu Anh',
        'Một ngày 8/3 thật ý nghĩa và trọn vẹn 🌸'
      ];

      function setCanvasSize(canvas, ctx) {
        canvas.width = Math.floor(W * DPR);
        canvas.height = Math.floor(H * DPR);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }

      function recalcLanes(resetTop = false) {
        if (W < 560) laneCount = 2;
        else if (W < 1280) laneCount = 3;
        else laneCount = 3;
        if (laneTopY.length !== laneCount || resetTop) {
          laneTopY = Array.from({length: laneCount}, (_, i) => -40 - i * 50 - Math.random() * 120);
        }
      }

      function clampX(x, w) {
        const minX = margin;
        const maxX = Math.max(margin, W - w - margin);
        return Math.max(minX, Math.min(maxX, x));
      }

      function laneBaseX(lane, w) {
        const safeLane = Math.max(0, Math.min(laneCount - 1, lane));
        const laneWidth = W / laneCount;
        const laneInset = Math.max(6, Math.min(18, laneWidth * 0.07));
        const left = safeLane * laneWidth + laneInset;
        const right = (safeLane + 1) * laneWidth - laneInset;
        const center = (left + right) * 0.5;
        return clampX(center - w * 0.5, w);
      }

      function recomputeWishTextStyle() {
        const laneWidth = W / Math.max(1, laneCount);
        const maxWidth = Math.max(148, Math.min(W - margin * 2, laneWidth - 14));
        const probe = document.createElement('span');
        probe.className = 'wish-item';
        probe.style.position = 'absolute';
        probe.style.left = '-99999px';
        probe.style.top = '-99999px';
        probe.style.visibility = 'hidden';
        probe.style.pointerEvents = 'none';
        probe.style.whiteSpace = 'nowrap';
        probe.style.maxWidth = 'none';
        probe.style.overflow = 'visible';
        probe.style.textOverflow = 'clip';
        document.body.appendChild(probe);

        const startSize = W < 560 ? 28 : 34;
        let sizeFound = 10;
        let fitsAtSize = false;

        for (let size = startSize; size >= 10; size--) {
          probe.style.fontSize = size + 'px';
          probe.style.letterSpacing = '0.2px';
          let fitsAll = true;
          for (const text of wishes) {
            probe.textContent = text;
            if (probe.getBoundingClientRect().width > maxWidth) {
              fitsAll = false;
              break;
            }
          }
          if (fitsAll) {
            sizeFound = size;
            fitsAtSize = true;
            break;
          }
          sizeFound = size;
        }

        let spacingFound = 0.2;
        if (!fitsAtSize) {
          for (let spacing = 0.2; spacing >= -1.2; spacing -= 0.1) {
            const spacingRounded = Number(spacing.toFixed(1));
            probe.style.fontSize = sizeFound + 'px';
            probe.style.letterSpacing = spacingRounded + 'px';
            let fitsAll = true;
            for (const text of wishes) {
              probe.textContent = text;
              if (probe.getBoundingClientRect().width > maxWidth) {
                fitsAll = false;
                break;
              }
            }
            if (fitsAll) {
              spacingFound = spacingRounded;
              break;
            }
            spacingFound = spacingRounded;
          }
        }

        wishFontSizePx = sizeFound;
        wishLetterSpacingPx = spacingFound;
        probe.remove();
      }

      function resize() {
        W = innerWidth;
        H = innerHeight;
        setCanvasSize(starsCanvas, starCtx);
        setCanvasSize(petalsCanvas, petalsCtx);
        initStars();
        recalcLanes();
        if(petals.length === 0) initPetals();
        if (physicsWishes.length > 0) {
          physicsWishes.forEach((wishObj) => {
            fitWishToViewport(wishObj);
            wishObj.lane = Math.max(0, Math.min(laneCount - 1, wishObj.lane || 0));
            wishObj.baseX = laneBaseX(wishObj.lane, wishObj.w);
            wishObj.x = clampX(wishObj.baseX, wishObj.w);
            wishObj.y = Math.max(-wishObj.h - 40, Math.min(H + wishObj.h + 40, wishObj.y));
            wishObj.renderX = wishObj.x;
            wishObj.renderY = wishObj.y;
          });
        }
      }

      function initStars() {
        const count = prefersReduced ? 140 : 280;
        stars = Array.from({length: count}, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          z: 0.25 + Math.random() * 1.7,
          r: 0.35 + Math.random() * 1.65,
          tw: Math.random() * Math.PI * 2
        }));
      }

      function drawStars(dt) {
        starCtx.clearRect(0, 0, W, H);
        const nebula = starCtx.createRadialGradient(W*0.26, H*0.18, 40, W*0.26, H*0.18, Math.max(W, H));
        nebula.addColorStop(0, 'rgba(255,111,180,0.09)');
        nebula.addColorStop(0.34, 'rgba(123,105,255,0.055)');
        nebula.addColorStop(1, 'rgba(0,0,0,0)');
        starCtx.fillStyle = nebula;
        starCtx.fillRect(0, 0, W, H);

        for (const s of stars) {
          s.tw += dt * 0.0026 * s.z;
          s.y += dt * 0.018 * s.z;
          s.x += dt * 0.009 * s.z;
          if (s.y > H + 10) { s.y = -10; s.x = Math.random() * W; }
          if (s.x > W + 10) { s.x = -10; s.y = Math.random() * H; }
          const alpha = 0.28 + 0.6 * (0.5 + 0.5 * Math.sin(s.tw));
          starCtx.beginPath();
          starCtx.fillStyle = `rgba(255,255,255,${alpha})`;
          starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          starCtx.fill();
        }
      }

      function spawnPetal(randomY = false) {
        const size = 11 + Math.random() * 16;
        return {
          x: Math.random() * W,
          y: randomY ? Math.random() * H : -30 - Math.random() * H * 0.16,
          vx: -0.2 + Math.random() * 0.45,
          vy: 0.35 + Math.random() * 0.82,
          rot: Math.random() * Math.PI * 2,
          vr: -0.02 + Math.random() * 0.04,
          size,
          sway: Math.random() * Math.PI * 2,
          depth: 0.65 + Math.random() * 1.2,
          hue: 327 + Math.random() * 18
        };
      }

      function initPetals() {
        const count = prefersReduced ? 30 : 60;
        petals = Array.from({length: count}, () => spawnPetal(true));
      }

      function drawPetalShape(ctx, x, y, s, rot, hue, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        const grad = ctx.createRadialGradient(0, 0, 1, -s*0.1, -s*0.1, s*1.2);
        grad.addColorStop(0, `hsla(${hue},85%,91%,${alpha})`);
        grad.addColorStop(0.55, `hsla(${hue},86%,78%,${alpha * 0.92})`);
        grad.addColorStop(1, `hsla(${hue},85%,66%,${alpha * 0.62})`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -s*0.56);
        ctx.bezierCurveTo(s*0.74, -s*0.56, s*0.84, s*0.26, 0, s*0.76);
        ctx.bezierCurveTo(-s*0.84, s*0.26, -s*0.74, -s*0.56, 0, -s*0.56);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function updatePetalArray(ctx, arr, dt) {
        ctx.clearRect(0, 0, W, H);
        windX += (targetWindX - windX) * Math.min(1, dt * 0.01);
        
        for (let i = 0; i < arr.length; i++) {
          const p = arr[i];
          p.sway += dt * 0.003 * p.depth;
          p.rot += dt * 0.002 * p.depth + p.vr;
          p.x += ((p.vx + (windX * 0.0015)) * dt * 0.12 * p.depth) + Math.sin(p.sway) * 0.06 * dt;
          p.y += p.vy * dt * 0.12 * p.depth;
          if (p.y > H + 60 || p.x < -80 || p.x > W + 80) {
            arr[i] = spawnPetal(false);
          }
          const a = 0.56 + 0.4 * (p.depth / 1.8);
          drawPetalShape(ctx, p.x, p.y, p.size * (0.72 + p.depth * 0.23), p.rot, p.hue, a);
        }
      }

      function typeLetter() {
        if (typeTimer) clearInterval(typeTimer);
        letterBody.innerHTML = '';
        letterSign.textContent = '';
        const fullText = letterParagraphs.join('\n\n');
        let i = 0;
        typeTimer = setInterval(() => {
          const current = fullText.slice(0, i);
          letterBody.innerHTML = current.replace(/\n/g, '<br>') + (i < fullText.length ? '<span class="typing-caret"></span>' : '');
          i++;
          if (i > fullText.length) {
            clearInterval(typeTimer);
            letterBody.innerHTML = fullText.replace(/\n/g, '<br>');
            letterSign.textContent = signature;
            
            setTimeout(() => {
              allowBouquet = true;
              bouquetTrigger.classList.add('enabled');
              bouquetHint.classList.add('show');
            }, 800); 
          }
        }, 18);
      }

      function primeAudio() {
        if (audioPrimed) return;
        audioPrimed = true;
        const previousMuted = audioEl.muted;
        audioEl.muted = true;
        const unlockPromise = audioEl.play();
        if (!unlockPromise || typeof unlockPromise.then !== 'function') {
          audioEl.muted = previousMuted;
          return;
        }
        unlockPromise.then(() => {
          // Chỉ dừng nếu vẫn đang ở chế độ prime (muted).
          if (audioEl.muted) {
            audioEl.pause();
            audioEl.currentTime = 0;
          }
          audioEl.muted = previousMuted;
        }).catch(() => {
          audioEl.muted = previousMuted;
          audioPrimed = false;
        });
      }

      function playMusicFromStart(showAlert = true) {
        audioEl.muted = false;
        audioEl.volume = 1;
        audioEl.currentTime = 0;
        audioEl.play().then(() => {
          musicOn = true;
          musicToggle.textContent = 'Tắt nhạc';
        }).catch(e => {
          musicOn = false;
          console.log('Chưa thể phát nhạc:', e);
          if (showAlert) {
            alert('Không phát được file audio.mp3, kiểm tra lại đường dẫn hoặc quyền truy cập file.');
          }
        });
      }

      openEnvelopeBtn.addEventListener('click', () => {
        primeAudio();
        if (introOpen) {
          introOpen = false;
          allowBouquet = false;
          letterStage.classList.remove('open');
          bouquetTrigger.classList.remove('enabled');
          bouquetHint.classList.remove('show');
          if (typeTimer) clearInterval(typeTimer);
          openEnvelopeBtn.innerHTML = '<span class="wax-dot">✦</span>Mở thư';
        } else {
          introOpen = true;
          letterStage.classList.add('open');
          setTimeout(() => typeLetter(), 480);
          openEnvelopeBtn.innerHTML = '<span class="wax-dot">✦</span>Đóng thư';
        }
      });

      // KHỞI TẠO CÁC LỜI CHÚC (Thả từ từ sau 0.5 giây)
      function initFloatingWishes() {
        textsContainer.innerHTML = '';
        physicsWishes = [];
        recalcLanes(true);
        laneCursor = 0;
        let spawnIndex = 0;

        const spawnTimer = setInterval(() => {
          if (spawnIndex >= wishes.length) {
            clearInterval(spawnTimer);
            return;
          }

          const text = wishes[spawnIndex];
          const el = document.createElement('div');
          el.className = 'wish-item';
          el.innerText = text;
          el.style.fontSize = wishFontSizePx + 'px';
          el.style.letterSpacing = wishLetterSpacingPx.toFixed(1) + 'px';
          textsContainer.appendChild(el);

          const physicsObj = {
            el,
            lane: laneCursor % laneCount,
            x: 0,
            y: 0,
            baseX: 0,
            vy: wishFallSpeed,
            drift: 4 + Math.random() * 6,
            phase: Math.random() * Math.PI * 2,
            renderX: 0,
            renderY: 0,
            bornAt: performance.now(),
            nextRefitAt: performance.now() + 1200,
            w: 0,
            h: 0
          };
          laneCursor++;
          physicsWishes.push(physicsObj);

          requestAnimationFrame(() => {
            fitWishToViewport(physicsObj);
            resetWish(physicsObj, true);
            el.style.opacity = 0.9 + Math.random() * 0.1;
          });

          spawnIndex++;
        }, 420); 
      }

      function fitWishToViewport(target) {
        const wishObj = target && target.el ? target : null;
        const el = wishObj ? wishObj.el : target;
        if (!el) return;
        el.style.fontSize = wishFontSizePx + 'px';
        el.style.letterSpacing = wishLetterSpacingPx.toFixed(1) + 'px';
        el.style.maxWidth = 'none';
        el.style.overflow = 'visible';
        el.style.textOverflow = 'clip';
        if (wishObj) {
          const rect = el.getBoundingClientRect();
          wishObj.w = rect.width;
          wishObj.h = rect.height;
          wishObj.lane = Math.max(0, Math.min(laneCount - 1, wishObj.lane || 0));
          wishObj.baseX = laneBaseX(wishObj.lane, wishObj.w);
          if (Number.isFinite(wishObj.x)) wishObj.x = clampX(wishObj.x, wishObj.w);
          if (Number.isFinite(wishObj.renderX)) wishObj.renderX = clampX(wishObj.renderX, wishObj.w);
        }
      }

      function resetWish(obj, fromTop = false) {
        obj.lane = Math.max(0, Math.min(laneCount - 1, obj.lane || 0));
        obj.baseX = laneBaseX(obj.lane, obj.w);
        obj.phase = Math.random() * Math.PI * 2;
        obj.drift = 4 + Math.random() * 6;
        obj.vy = wishFallSpeed;
        obj.x = clampX(obj.baseX, obj.w);

        if (fromTop) {
          laneTopY[obj.lane] -= obj.h + laneVerticalGap + 18 + Math.random() * 22;
          obj.y = laneTopY[obj.lane];
          if (laneTopY[obj.lane] < -H * 1.8) {
            laneTopY[obj.lane] = -40 - Math.random() * 160;
          }
        } else {
          obj.y = Math.random() * (H * 0.25);
        }

        obj.renderX = obj.x;
        obj.renderY = obj.y;
        obj.bornAt = performance.now();
        obj.nextRefitAt = obj.bornAt + 1200;
      }

      function updatePhysicsWishes(dt) {
        if (!dropStarted || physicsWishes.length === 0) return;
        const timeScale = Math.min(dt / 16, 1.2);
        const nowTs = performance.now();

        physicsWishes.forEach(a => {
          if (a.w === 0) return;
          const inWarmup = nowTs - a.bornAt < wishWarmupMs;
          if (!a.nextRefitAt || nowTs >= a.nextRefitAt) {
            fitWishToViewport(a);
            a.baseX = laneBaseX(a.lane, a.w);
            a.x = clampX(a.x, a.w);
            a.renderX = clampX(a.renderX, a.w);
            a.nextRefitAt = nowTs + 1200;
          }

          a.phase += dt * 0.0012;
          const driftX = Math.sin(a.phase) * a.drift;
          const windInfluence = windX * (inWarmup ? 0.00001 : 0.00002) * timeScale;
          a.x = clampX(a.baseX + driftX + windInfluence, a.w);
          a.y += a.vy * timeScale;

          if (a.y > H + a.h + 20) {
            resetWish(a, true);
            a.el.style.opacity = 0.9 + Math.random() * 0.1;
          }
        });

        // Giữ khoảng cách dọc trong từng lane để chữ không dính nhau
        for (let lane = 0; lane < laneCount; lane++) {
          const laneItems = physicsWishes.filter(item => item.w > 0 && item.lane === lane).sort((a, b) => a.y - b.y);
          for (let i = 1; i < laneItems.length; i++) {
            const prev = laneItems[i - 1];
            const curr = laneItems[i];
            const minGap = (prev.h + curr.h) * 0.5 + laneVerticalGap;
            if (curr.y < prev.y + minGap) {
              curr.y = prev.y + minGap;
            }
          }
        }

        physicsWishes.forEach(a => {
          if (a.w === 0) return;
          const inWarmup = nowTs - a.bornAt < wishWarmupMs;
          a.x = clampX(a.x, a.w);
          const smooth = inWarmup ? 0.2 : 0.28;
          a.renderX += (a.x - a.renderX) * smooth;
          a.renderY += (a.y - a.renderY) * smooth;
          a.renderX = clampX(a.renderX, a.w);
          a.el.style.transform = `translate3d(${a.renderX}px, ${a.renderY}px, 0)`;
        });
      }

      bouquetTrigger.addEventListener('click', () => {
        if (!allowBouquet || dropStarted) return;
        dropStarted = true;
        if (audioEl.paused) {
          playMusicFromStart(false);
          setTimeout(() => {
            if (audioEl.paused) {
              playMusicFromStart(true);
            }
          }, 90);
        }
        bouquetHint.classList.remove('show');
        introScene.classList.add('gone');
        dropScene.classList.add('show');

        // Chờ đúng 0.3 giây sau khi vào không gian mới thả chữ
        setTimeout(() => {
          initFloatingWishes();
        }, textDelayMs);
      });

      bouquetTrigger.addEventListener('pointerdown', () => {
        if (!allowBouquet || dropStarted) return;
        audioEl.muted = false;
        audioEl.currentTime = 0;
        audioEl.play().catch(() => playMusicFromStart(false));
      }, {passive:true});

      musicToggle.addEventListener('click', () => {
        if (!audioEl.paused) {
          audioEl.pause();
          musicOn = false;
          musicToggle.textContent = 'Bật nhạc';
          return;
        }
        playMusicFromStart();
      });

      addEventListener('pointerdown', (e) => {
        if (!dropStarted) return;
        pointerDown = true;
        lastPointerX = e.clientX;
      }, {passive:true});

      addEventListener('pointermove', (e) => {
        if (!dropStarted || !pointerDown) return;
        const dx = e.clientX - lastPointerX;
        lastPointerX = e.clientX;
        targetWindX = Math.max(-1200, Math.min(1200, dx * 30));
      }, {passive:true});

      addEventListener('pointerup', () => {
        pointerDown = false;
        targetWindX = 0;
      }, {passive:true});

      function loop(now) {
        const dt = Math.min(40, now - last);
        last = now;
        
        drawStars(dt);
        updatePetalArray(petalsCtx, petals, dt);
        
        if (dropStarted) {
          updatePhysicsWishes(dt);
        }
        
        requestAnimationFrame(loop);
      }

      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
